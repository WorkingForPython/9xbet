name: Build Windows MSI

on:
  push:
    branches: [ "main", "master" ] # Runs automatically when you push
  workflow_dispatch:               # Adds a button to run it manually

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17' # Change to 11 or 21 if you are using a different Java version
        distribution: 'temurin'

    - name: Build Fat JAR with Maven
      run: mvn clean package

    - name: Create MSI with jpackage
      run: |
        jpackage --type msi --name AuctionApp --app-version 1.0 --input target/ --main-jar AuctionApp-1.0-SNAPSHOT.jar --win-shortcut --win-menu
      
    - name: Upload MSI for download
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Installer
        path: "*.msi"
