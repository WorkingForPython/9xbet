name: Build Windows MSI

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build Fat JAR with Maven
      working-directory: ./Project_Auction
      run: mvn clean package

    - name: Create MSI with jpackage
      working-directory: ./Project_Auction
      shell: pwsh
      run: |
        # 1. Automatically find the Fat JAR (and ignore the 'original' skinny one)
        $jarFile = (Get-ChildItem -Path target/ -Filter *.jar | Where-Object { $_.Name -notmatch '^original-' } | Select-Object -First 1).Name
        Write-Host "Successfully found JAR: $jarFile"
        
        # 2. Build the MSI using the exact file we just found
        jpackage --type msi --name AuctionApp --app-version 1.0 --input target/ --main-jar $jarFile --win-shortcut --win-menu
      
    - name: Upload MSI for download
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Installer
        path: "**/*.msi"
