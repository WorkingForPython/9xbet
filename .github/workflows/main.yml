name: Build Windows MSI

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build and Gather Dependencies
      working-directory: ./Project_Auction
      shell: pwsh
      run: |
        mvn clean package
        mvn dependency:copy-dependencies -DoutputDirectory=target/libs -DincludeScope=runtime
        
        $jarFile = (Get-ChildItem -Path target/ -Filter *.jar | Where-Object { $_.Name -notmatch '^original-' } | Select-Object -First 1)
        Copy-Item $jarFile.FullName -Destination target/libs/
        Write-Host "Successfully prepared libs folder!"

    - name: Create MSI with jpackage
      working-directory: ./Project_Auction
      shell: pwsh
      run: |
        $jarName = (Get-ChildItem -Path target/ -Filter *.jar | Where-Object { $_.Name -notmatch '^original-' } | Select-Object -First 1).Name
        jpackage --type msi --name AuctionApp --app-version 1.0 --input target/libs/ --main-jar $jarName --main-class com.auction.app.Launcher --win-shortcut --win-menu --win-console
      
    - name: Upload MSI for download
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Installer
        path: "**/*.msi"
